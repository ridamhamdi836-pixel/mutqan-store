services:
  mutqan_database:
    image: postgres:16-alpine
    container_name: mutqan_database
    environment:
      POSTGRES_DB: mutqan
      POSTGRES_USER: mutqan
      POSTGRES_PASSWORD: mutqan
    volumes:
      - mutqan_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mutqan -d mutqan"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: mutqan_backend
    environment:
      DATABASE_URL: postgresql+psycopg://mutqan:mutqan@mutqan_database:5432/mutqan
      APP_ENV: development
      CORS_ORIGINS: "http://localhost:3000,https://mutqan.online"
      SECRET_KEY: dev-secret-key-replace-in-production
      ADMIN_API_KEY: dev-admin-key-replace-in-production
    depends_on:
      mutqan_database:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      target: deps
    container_name: mutqan_frontend
    environment:
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  mutqan_postgres_data:
